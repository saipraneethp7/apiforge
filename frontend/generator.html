<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APIForge — Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --surface2: #f4f4f2;
      --border: rgba(0,0,0,0.08);
      --border-hover: rgba(0,0,0,0.16);
      --text: #0f0f0f;
      --muted: #6b7280;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --green: #10b981;
      --red: #ef4444;
      --gradient: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Navbar */
    nav {
      background: rgba(250,250,249,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .nav-right a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-right a:hover { color: var(--accent); }

    /* Main layout */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 1.5rem;
      min-height: calc(100vh - 60px);
    }

    /* Left panel */
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
    }

    .panel-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    .description-input {
      width: 100%;
      height: 140px;
      padding: 0.9rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      resize: none;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.6;
    }

    .description-input:focus {
      border-color: rgba(99,102,241,0.4);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
    }

    .description-input::placeholder { color: var(--muted); }

    .char-count {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: right;
      margin-top: 0.4rem;
    }

    .char-count.warning { color: var(--red); }

    /* Language picker */
    .lang-tabs {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .lang-tab {
      flex: 1;
      padding: 0.55rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      text-align: center;
    }

    .lang-tab:hover { border-color: var(--border-hover); color: var(--text); }
    .lang-tab.active { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.3); color: var(--accent); }

    .framework-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    .framework-btn {
      padding: 0.65rem 0.8rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .framework-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .framework-btn.active { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.3); color: var(--accent); font-weight: 600; }

    /* Generate button */
    .generate-btn {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      position: relative;
      overflow: hidden;
    }

    .generate-btn:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
    .generate-btn:active { transform: translateY(0); }
    .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    .generate-btn.loading { background: var(--accent2); }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* History */
    .history-item {
      padding: 0.7rem 0.9rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 0.5rem;
    }

    .history-item:hover { border-color: rgba(99,102,241,0.3); }
    .history-item:last-child { margin-bottom: 0; }

    .history-title {
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-meta { font-size: 0.72rem; color: var(--muted); }

    /* Right panel */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      min-height: 500px;
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      background: rgba(99,102,241,0.08);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }

    .empty-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .empty-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.6; max-width: 360px; }

    .example-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1.5rem;
    }

    .example-prompt {
      padding: 0.45rem 0.9rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-prompt:hover { border-color: rgba(99,102,241,0.3); color: var(--accent); background: rgba(99,102,241,0.05); }

    /* Result */
    .result-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeUp 0.4s ease both;
    }

    .result-title {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .result-desc { font-size: 0.85rem; color: var(--muted); margin-top: 0.2rem; }

    .result-actions { display: flex; gap: 0.5rem; }

    .action-btn {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
    }

    .action-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .action-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .action-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
    .action-btn.success { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: var(--green); }

    /* Tabs */
    .result-tabs {
      display: flex;
      gap: 0.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.4rem;
      animation: fadeUp 0.4s ease 0.05s both;
    }

    .result-tab {
      flex: 1;
      padding: 0.55rem;
      background: transparent;
      border: none;
      border-radius: 8px;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .result-tab:hover { color: var(--text); }
    .result-tab.active { background: var(--accent); color: white; }

    /* Tab content */
    .tab-content { display: none; animation: fadeUp 0.3s ease both; }
    .tab-content.active { display: block; }

    /* Code block */
    .code-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .code-header {
      background: #1e1e2e;
      padding: 0.75rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .code-dots { display: flex; gap: 0.4rem; }
    .code-dot { width: 10px; height: 10px; border-radius: 50%; }
    .code-dot.r { background: #ff5f57; }
    .code-dot.y { background: #febc2e; }
    .code-dot.g { background: #28c840; }

    .code-filename { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: rgba(255,255,255,0.4); }

    .copy-btn {
      padding: 0.3rem 0.8rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .copy-btn:hover { background: rgba(255,255,255,0.14); color: white; }
    .copy-btn.copied { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.3); color: #34d399; }

    .code-block {
      max-height: 500px;
      overflow-y: auto;
      margin: 0;
    }

    .code-block code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.7;
      padding: 1.5rem !important;
      display: block;
    }

    /* Routes */
    .routes-grid {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.2rem;
    }

    .route-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: all 0.2s;
    }

    .route-item:hover { border-color: var(--border-hover); transform: translateX(4px); }

    .method-badge {
      padding: 0.25rem 0.65rem;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      min-width: 64px;
      text-align: center;
    }

    .method-badge.GET    { background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
    .method-badge.POST   { background: rgba(99,102,241,0.1); color: #6366f1; border: 1px solid rgba(99,102,241,0.2); }
    .method-badge.PUT    { background: rgba(245,158,11,0.1); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
    .method-badge.DELETE { background: rgba(239,68,68,0.1);  color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
    .method-badge.PATCH  { background: rgba(6,182,212,0.1);  color: #06b6d4; border: 1px solid rgba(6,182,212,0.2); }

    .route-path { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 500; color: var(--text); }
    .route-desc { font-size: 0.8rem; color: var(--muted); margin-left: auto; }

    /* Setup */
    .setup-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
    }

    .setup-deps {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .dep-tag {
      padding: 0.3rem 0.8rem;
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }

    .setup-steps {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 2;
      white-space: pre-line;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--text);
      color: var(--bg);
      border-radius: 10px;
      padding: 0.85rem 1.3rem;
      font-size: 0.84rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">⚡ APIForge</a>
    <div class="nav-right">
      <span id="gen-count">0 APIs generated this session</span>
      <a href="index.html">← Back to home</a>
    </div>
  </div>
</nav>

<div class="main">
  <div class="left-panel">

    <div class="panel">
      <div class="panel-title">Describe your API</div>
      <textarea
        class="description-input"
        id="description"
        placeholder="e.g. A REST API for a library system with books, members and borrowing records. Include search and overdue tracking."
        maxlength="500"
        oninput="updateCharCount()"
      ></textarea>
      <div class="char-count" id="char-count">0 / 500</div>
    </div>

    <div class="panel">
      <div class="panel-title">Language</div>
      <div class="lang-tabs">
        <button class="lang-tab active" data-lang="python" onclick="selectLanguage('python')">🐍 Python</button>
        <button class="lang-tab" data-lang="javascript" onclick="selectLanguage('javascript')">🟨 JavaScript</button>
        <button class="lang-tab" data-lang="go" onclick="selectLanguage('go')">🔵 Go</button>
      </div>
      <div class="panel-title" style="margin-top:0.5rem">Framework</div>
      <div class="framework-grid" id="framework-grid"></div>
    </div>

    <button class="generate-btn" id="generate-btn" onclick="generate()">
      <span>⚡</span> Generate API
    </button>

    <div class="panel" id="history-panel" style="display:none">
      <div class="panel-title">Recent generations</div>
      <div id="history-list"></div>
    </div>

  </div>

  <div class="right-panel" id="right-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">⚡</div>
      <div class="empty-title">Ready to generate</div>
      <div class="empty-desc">Describe your API on the left, pick your language and framework, then hit Generate.</div>
      <div class="example-prompts">
        <div class="example-prompt" onclick="useExample('A REST API for a blog with posts, comments and user authentication')">Blog API</div>
        <div class="example-prompt" onclick="useExample('An e-commerce API with products, cart, orders and payments')">E-commerce API</div>
        <div class="example-prompt" onclick="useExample('A task management API with projects, tasks, assignees and deadlines')">Task Manager API</div>
        <div class="example-prompt" onclick="useExample('A social media API with users, posts, likes, follows and notifications')">Social Media API</div>
        <div class="example-prompt" onclick="useExample('A restaurant API with menu items, orders, tables and reservations')">Restaurant API</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script>
  const API = "https://apiforge-gmnb.onrender.com";
  let selectedLang = "python";
  let selectedFramework = "fastapi";
  let currentResult = null;
  let genCount = 0;
  let history = JSON.parse(localStorage.getItem("apiforge-history") || "[]");

  const frameworks = {
    python: [
      { id: "fastapi", label: "FastAPI", icon: "⚡" },
      { id: "flask", label: "Flask", icon: "🌶" },
      { id: "django", label: "Django", icon: "🎸" }
    ],
    javascript: [
      { id: "express", label: "Express", icon: "🚀" },
      { id: "fastify", label: "Fastify", icon: "⚡" }
    ],
    go: [
      { id: "gin", label: "Gin", icon: "🍸" },
      { id: "echo", label: "Echo", icon: "🔊" }
    ]
  };

  function selectLanguage(lang) {
    selectedLang = lang;
    document.querySelectorAll(".lang-tab").forEach(function(t) { t.classList.remove("active"); });
    document.querySelector('[data-lang="' + lang + '"]').classList.add("active");
    renderFrameworks();
  }

  function renderFrameworks() {
    var grid = document.getElementById("framework-grid");
    var fws = frameworks[selectedLang];
    grid.innerHTML = "";
    selectedFramework = fws[0].id;
    fws.forEach(function(fw, i) {
      var btn = document.createElement("button");
      btn.className = "framework-btn" + (i === 0 ? " active" : "");
      btn.innerHTML = fw.icon + " " + fw.label;
      btn.onclick = function() {
        selectedFramework = fw.id;
        document.querySelectorAll(".framework-btn").forEach(function(b) { b.classList.remove("active"); });
        btn.classList.add("active");
      };
      grid.appendChild(btn);
    });
  }

  function updateCharCount() {
    var val = document.getElementById("description").value.length;
    var el = document.getElementById("char-count");
    el.textContent = val + " / 500";
    el.classList.toggle("warning", val > 450);
  }

  function useExample(text) {
    document.getElementById("description").value = text;
    updateCharCount();
    showToast("Example loaded. Hit Generate!");
  }

  function showToast(msg) {
    var toast = document.getElementById("toast");
    document.getElementById("toast-msg").textContent = msg;
    toast.classList.add("show");
    setTimeout(function() { toast.classList.remove("show"); }, 2500);
  }

  function saveToHistory(result, lang, framework) {
    history.unshift({ title: result.title, description: result.description, lang: lang, framework: framework, result: result, time: new Date().toLocaleTimeString() });
    if (history.length > 10) history.pop();
    localStorage.setItem("apiforge-history", JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) return;
    document.getElementById("history-panel").style.display = "block";
    var list = document.getElementById("history-list");
    list.innerHTML = "";
    history.forEach(function(item, i) {
      var el = document.createElement("div");
      el.className = "history-item";
      el.innerHTML = "<div class='history-title'>" + item.title + "</div><div class='history-meta'>" + item.lang + " + " + item.framework + " · " + item.time + "</div>";
      el.onclick = function() { renderResult(item.result, item.lang); };
      list.appendChild(el);
    });
  }

  async function generate() {
    var description = document.getElementById("description").value.trim();
    if (!description) { showToast("Please describe your API first!"); return; }

    var btn = document.getElementById("generate-btn");
    btn.disabled = true;
    btn.innerHTML = "<div class='spinner'></div> Generating...";

    document.getElementById("empty-state") && (document.getElementById("empty-state").style.display = "none");

    try {
      var res = await fetch(API + "/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ description: description, language: selectedLang, framework: selectedFramework })
      });

      if (!res.ok) throw new Error("Generation failed");
      var result = await res.json();

      genCount++;
      document.getElementById("gen-count").textContent = genCount + " API" + (genCount !== 1 ? "s" : "") + " generated this session";

      saveToHistory(result, selectedLang, selectedFramework);
      renderResult(result, selectedLang);
      showToast("API generated successfully!");

    } catch (err) {
      showToast("Generation failed. Please try again.");
      document.getElementById("empty-state") && (document.getElementById("empty-state").style.display = "flex");
    }

    btn.disabled = false;
    btn.innerHTML = "<span>⚡</span> Generate API";
  }

  function renderResult(result, lang) {
    currentResult = result;
    var panel = document.getElementById("right-panel");

    var ext = lang === "python" ? "py" : lang === "javascript" ? "js" : "go";
    var hlLang = lang === "javascript" ? "javascript" : lang === "go" ? "go" : "python";

    var code = result.code.replace(/\\n/g, "\n");
    var highlighted = hljs.highlight(code, { language: hlLang }).value;

    panel.innerHTML =
      "<div class='result-header'>" +
        "<div>" +
          "<div class='result-title'>" + result.title + "</div>" +
          "<div class='result-desc'>" + result.description + "</div>" +
        "</div>" +
        "<div class='result-actions'>" +
          "<button class='action-btn' onclick='downloadCode(\"" + ext + "\")'> Download ." + ext + "</button>" +
          "<button class='action-btn primary' onclick='generate()'>↻ Regenerate</button>" +
        "</div>" +
      "</div>" +

      "<div class='result-tabs'>" +
        "<button class='result-tab active' onclick='switchTab(this, \"code\")'>📄 Code</button>" +
        "<button class='result-tab' onclick='switchTab(this, \"routes\")'>🗺 Routes (" + result.routes.length + ")</button>" +
        "<button class='result-tab' onclick='switchTab(this, \"setup\")'>🚀 Setup</button>" +
      "</div>" +

      "<div class='tab-content active' id='tab-code'>" +
        "<div class='code-wrapper'>" +
          "<div class='code-header'>" +
            "<div class='code-dots'><div class='code-dot r'></div><div class='code-dot y'></div><div class='code-dot g'></div></div>" +
            "<span class='code-filename'>generated_api." + ext + "</span>" +
            "<button class='copy-btn' id='copy-btn' onclick='copyCode()'>Copy code</button>" +
          "</div>" +
          "<pre class='code-block'><code class='language-" + hlLang + "'>" + highlighted + "</code></pre>" +
        "</div>" +
      "</div>" +

      "<div class='tab-content' id='tab-routes'>" +
        "<div class='routes-grid'>" +
          result.routes.map(function(route) {
            return "<div class='route-item'><span class='method-badge " + route.method + "'>" + route.method + "</span><span class='route-path'>" + route.path + "</span><span class='route-desc'>" + route.description + "</span></div>";
          }).join("") +
        "</div>" +
      "</div>" +

      "<div class='tab-content' id='tab-setup'>" +
        "<div class='setup-content'>" +
          "<div class='panel-title' style='margin-bottom:0.8rem'>Dependencies</div>" +
          "<div class='setup-deps'>" +
            result.dependencies.map(function(d) { return "<span class='dep-tag'>" + d + "</span>"; }).join("") +
          "</div>" +
          "<div class='panel-title' style='margin-bottom:0.8rem'>Setup instructions</div>" +
          "<div class='setup-steps'>" + result.setup.replace(/\\n/g, "\n") + "</div>" +
        "</div>" +
      "</div>";
  }

  function switchTab(btn, tab) {
    document.querySelectorAll(".result-tab").forEach(function(t) { t.classList.remove("active"); });
    document.querySelectorAll(".tab-content").forEach(function(t) { t.classList.remove("active"); });
    btn.classList.add("active");
    document.getElementById("tab-" + tab).classList.add("active");
  }

  function copyCode() {
    if (!currentResult) return;
    var code = currentResult.code.replace(/\\n/g, "\n");
    navigator.clipboard.writeText(code).then(function() {
      var btn = document.getElementById("copy-btn");
      btn.textContent = "Copied!";
      btn.classList.add("copied");
      setTimeout(function() { btn.textContent = "Copy code"; btn.classList.remove("copied"); }, 2000);
      showToast("Code copied to clipboard!");
    });
  }

  function downloadCode(ext) {
    if (!currentResult) return;
    var code = currentResult.code.replace(/\\n/g, "\n");
    var blob = new Blob([code], { type: "text/plain" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "generated_api." + ext;
    a.click();
    showToast("File downloaded!");
  }

  renderFrameworks();
  renderHistory();
</script>
</body>
</html>
